services:
  app:
    build: .
    image : sharehub-app
    container_name: sharehub-app
    ports : 
      - "${PORT}:${PORT}"
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://mongo:27017/ShareHub
      - REDIS_HOST=redis
    volumes:
      - ./logs:/app/logs
    depends_on:
      mongo : 
        condition : service_healthy
      redis : 
        condition : service_healthy
    restart : unless-stopped

  mongo : 
    image : mongo:7
    container_name: sharehub-mongo
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ping : 1})"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart : unless-stopped

  redis : 
    image : redis:7-alpine
    container_name : sharehub-redis
    volumes : 
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart  : unless-stopped

volumes:
  mongo_data:
  redis_data:

